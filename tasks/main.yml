---
- name: Install chrony
  ansible.builtin.package:
    name: "{{ ntp_package }}"
    state: present
  tags: ntp

- name: Deploy chrony configuration
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart chrony
  tags: ntp

- name: Enable and start chrony service
  ansible.builtin.service:
    name: "{{ ntp_service }}"
    state: started
    enabled: true
  tags: ntp
